---

- name: Ensure /usr/lib/openssh/sftp-server is in shells file
  lineinfile:
    path: /etc/shells
    line: /usr/lib/openssh/sftp-server
    state: present

- name: Create user firmwareupload
  user:
    name: firmwareupload
    shell: /usr/lib/openssh/sftp-server
    system: yes
    create_home: yes

- name: Ensure firmware staging directory exists
  file:
    path: /var/www/tmp-firmware-before-merge/
    state: directory
    owner: firmwareupload
    group: firmwareupload
    mode: '0755'

- name: Restrict SSH access for firmwareupload user
  copy:
    dest: /etc/ssh/sshd_config.d/restrict_firmwareupload_user.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      Match User firmwareupload
          ForceCommand internal-sftp
          ChrootDirectory /var/www/tmp-firmware-before-merge/
          PermitTunnel no
          AllowTcpForwarding no
          X11Forwarding no
  notify: restart ssh

- name: Deploy key for firmwareupload user
  authorized_key:
    user: firmwareupload
    state: present
    key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIB6dpIK3Rr4QrQ6PDxbWJHGohhp9gH/apw4nXtUkaNXd forgejo-firmware-publish"
