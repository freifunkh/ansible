---

- name: Handle nftables firewalling
  block:
  - name: Create nftables directory if necessary
    ansible.builtin.file:
      path: "/etc/nftables"
      state: "directory"
      owner: "root"
      group: "root"
      mode: "0755"
  - name: Open port(s) in firewall (nftables)
    notify: "reload nftables"
    ansible.builtin.template:
      src: "nftables.conf.j2"
      dest: "/etc/nftables/50-traefik.conf"
      owner: "root"
      group: "root"
      mode: "0755"
  when: nftables_enabled is defined and nftables_enabled is true

- name: Create path for traefik config
  ansible.builtin.file:
    path: "/etc/traefik"
    state: "directory"
    mode: "0755"
    owner: "root"
    group: "root"

- name: Create/Update Traefik static configuration in /etc/traefik/traefik.yml
  ansible.builtin.template:
    src: "traefik.yml.j2"
    dest: "/etc/traefik/traefik.yml"
    mode: "0644"
    owner: "root"
    group: "root"

- name: Create path for traefik compose file
  ansible.builtin.file:
    path: "{{ traefik_path }}"
    state: "directory"
    mode: "0755"
    owner: "root"
    group: "root"

- name: Create/Update Traefik docker compose file
  ansible.builtin.template:
    src: "docker-compose.yml.j2"
    dest: "{{ traefik_path }}/docker-compose.yml"
    mode: "0644"
    owner: "root"
    group: "root"

- name: Create path for traefik config dropins
  ansible.builtin.file:
    path: "/etc/traefik/conf"
    state: "directory"
    mode: "0755"
    owner: "root"
    group: "root"

- name: Deploy additional dynamic configuration for Traefik
  ansible.builtin.template:
    src: "other.yml.j2"
    dest: "/etc/traefik/conf/other.yml"
    mode: "0644"
    owner: "root"
    group: "root"

- name: Deploy Traefik
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_path }}"
    build: "never"
    state: "present"
